<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد المنقذ الذكي الحقيقي 🤖</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0b0f19;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between">

    <!-- شريط التنقل العلوي -->
    <header class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group text-slate-400 hover:text-white transition text-sm">
                <span>➡️</span><span>العودة للرئيسية</span>
            </a>
            <div class="flex items-center gap-1.5">
                <span class="text-xl">🤖</span>
                <span class="font-bold text-white text-sm md:text-base">مساعد المنقذ الذكي</span>
            </div>
        </div>
    </header>

    <!-- مساحة الدردشة والاتصال بالذكاء الاصطناعي -->
    <main class="flex-grow flex items-center justify-center py-10 px-4">
        <div class="w-full max-w-3xl bg-slate-900/80 border border-slate-800/80 rounded-3xl p-6 md:p-8 shadow-2xl space-y-6">
            
            <div class="text-center space-y-2">
                <h1 class="text-2xl md:text-3xl font-extrabold text-white">الذكاء الاصطناعي التفاعلي المباشر</h1>
                <p class="text-xs md:text-sm text-slate-400">اطرح أي سؤال، اطلب تلخيصاً، ترجمة، أو إعادة صياغة نصوص حقيقية وديناميكية.</p>
            </div>

            <!-- صندوق الكتابة والدخول للبيانات -->
            <div class="space-y-4">
                <label for="userInput" class="block text-sm font-semibold text-slate-300">ما الذي تود إنجازه الآن؟</label>
                <textarea id="userInput" rows="5" class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl p-4 text-slate-100 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition placeholder-slate-600 text-sm md:text-base" placeholder="اكتب سؤالك، أو الصق نصاً طويلاً لتلخيصه، أو اطلب ما تريد..."></textarea>
                
                <button onclick="askGemini()" id="sendBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold py-3.5 rounded-2xl transition duration-150 flex items-center justify-center gap-2 shadow-lg shadow-emerald-950/40">
                    <span id="btnText">إرسال لـ Gemini API</span>
                </button>
            </div>

            <!-- صندوق الإجابة الحية -->
            <div class="mt-6 border-t border-slate-850 pt-6 hidden" id="resultContainer">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-emerald-400 flex items-center gap-1.5">
                        <span>✨</span> الرد الذكي المولد فوراَ:
                    </h2>
                    <button onclick="copyResponse()" class="text-xs text-slate-400 hover:text-white bg-slate-800 px-3 py-1 rounded-md transition">نسخ الإجابة</button>
                </div>
                <div id="aiResponse" class="bg-slate-950/90 p-5 rounded-2xl border border-slate-850 text-slate-200 leading-relaxed text-sm md:text-base whitespace-pre-line text-right">
                    <!-- الإجابات ستولد وتظهر هنا ديناميكياً -->
                </div>
            </div>

        </div>
    </main>

    <!-- الفوتر السفلي -->
    <footer class="border-t border-slate-800/60 py-6 bg-slate-900/30 text-center text-xs text-slate-500">
        <p>© 2026 المنقذ الذكي - متصل بـ Google Gemini.</p>
    </footer>

    <script>
        // الرمز الخاص بك مدمج وجاهز تماماً للتشغيل
        const GEMINI_API_KEY = "AQ.Ab8RN6LMKTnyPWOjuQYOnPlYQ0-ZoLNQlxiTn6Q4YTqJReAlBQ";

        async function askGemini() {
            const userInput = document.getElementById('userInput').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            const btnText = document.getElementById('btnText');
            const resultContainer = document.getElementById('resultContainer');
            const aiResponse = document.getElementById('aiResponse');

            if (!userInput) {
                alert("يرجى كتابة سؤال أو نص أولاً!");
                return;
            }

            // تفعيل حالة الانتظار والتفكير للمتصفح
            sendBtn.disabled = true;
            btnText.innerText = "جاري الاتصال بـ Google وجلب الإجابة الحية...";
            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // استدعاء نموذج Gemini 1.5 Flash فائق السرعة
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userInput }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error("فشل الاتصال بالخادم الذكي. تأكد من صحة مفتاح الـ API.");
                }

                const data = await response.json();
                const textGenerated = data.candidates[0].content.parts[0].text;

                // إظهار صندوق النتيجة وعرض الرد فيه
                resultContainer.classList.remove('hidden');
                aiResponse.innerText = textGenerated;

                // تمرير الصفحة لأسفل لرؤية النتيجة بوضوح
                resultContainer.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert("عذراً، حدث خطأ: " + error.message);
            } finally {
                // استعادة الوضع الطبيعي للزر
                sendBtn.disabled = false;
                btnText.innerText = "إرسال لـ Gemini API";
                sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // دالة إضافية لنسخ الرد بضغطة زر واحدة لمزيد من الرفاهية والسهولة للزائر
        function copyResponse() {
            const responseText = document.getElementById('aiResponse').innerText;
            if(!responseText) return;
            navigator.clipboard.writeText(responseText);
            alert("تم نسخ الرد الذكي بنجاح! 📋");
        }
    </script>
</body>
</html>
